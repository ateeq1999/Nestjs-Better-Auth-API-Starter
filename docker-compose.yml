version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nest_better_auth_db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nest_better_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: nest_better_auth_mailpit
    ports:
      - '1025:1025'
      - '8025:8025'
    environment:
      MP_SMTP_AUTH_IGNORE: 'true'
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 1025 || exit 1']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
