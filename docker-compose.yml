version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Application (P19 D9) — uncomment to run the full stack in Docker
  # Build first: docker build -t nest-better-auth .
  # Then: docker compose up -d
  # ─────────────────────────────────────────────────────────────────────────────
  # api:
  #   image: nest-better-auth:latest
  #   container_name: nest_better_auth_api
  #   ports:
  #     - '5555:5555'
  #   env_file: .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ['CMD-SHELL', 'wget -qO- http://localhost:5555/health || exit 1']
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 30s
  #   restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: nest_better_auth_db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nest_better_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nest_better_auth_redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: nest_better_auth_mailpit
    ports:
      - '1025:1025'
      - '8025:8025'
    environment:
      MP_SMTP_AUTH_IGNORE: 'true'
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 1025 || exit 1']
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # MinIO — S3-compatible local object storage (P17)
  # Console UI: http://localhost:9001  (login: minioadmin / minioadmin)
  # API:        http://localhost:9000
  # ─────────────────────────────────────────────────────────────────────────────
  minio:
    image: quay.io/minio/aistor/minio:latest
    container_name: nest_better_auth_minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD-SHELL', 'mc ready local || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Adminer — lightweight DB browser (P19 D3)
  # UI: http://localhost:8080  (System: PostgreSQL, Server: postgres, User: postgres, Pass: postgres)
  # ─────────────────────────────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: nest_better_auth_adminer
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────────────────
  # RedisInsight — Redis GUI (P19 D4)
  # UI: http://localhost:5540
  # ─────────────────────────────────────────────────────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: nest_better_auth_redisinsight
    ports:
      - '5540:5540'
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
