# Nginx reverse proxy for NestJS Better-Auth API (P19 D7)
# Place behind Nginx for TLS termination + static file serving.
#
# Usage with Docker:
#   docker run -v $(pwd)/nginx.conf:/etc/nginx/nginx.conf:ro -p 80:80 -p 443:443 nginx:alpine
#
# Or add an nginx service to docker-compose.prod.yml pointing at this file.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # ─── Security headers ────────────────────────────────────────────────────
  add_header X-Frame-Options           SAMEORIGIN always;
  add_header X-Content-Type-Options    nosniff    always;
  add_header X-XSS-Protection          "1; mode=block" always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ─── Rate limiting ───────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;

  # ─── Upstream ────────────────────────────────────────────────────────────
  upstream nest_api {
    server api:5555;           # docker-compose service name
    keepalive 32;
  }

  # ─── HTTP → HTTPS redirect ───────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ─── HTTPS ───────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;   # replace with your domain

    # TLS certificates — use Let's Encrypt (certbot) or Cloudflare
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 10M;  # allow file uploads up to 10 MB

    # ─── Auth endpoints — stricter rate limit ─────────────────────────────
    location ~ ^/api/auth/(sign-in|sign-up|forget-password|reset-password) {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass         http://nest_api;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── All other API routes ─────────────────────────────────────────────
    location / {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://nest_api;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
